<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AA — Sign in (fixture)</title>
<link rel="stylesheet" href="/pages/_shared.css">
</head>
<body data-aa-state="aa.unauth">
<header class="aa-bar">
  <div class="brand">AA Fixture Portal</div>
  <nav>
    <a href="/">Sign in</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/travel-planner">Travel Planner</a>
    <a href="/results">Results</a>
    <a href="/confirm">Confirm</a>
  </nav>
</header>
<div class="state-strip">State: aa.unauth</div>
<main>
  <h1>Sign in</h1>
  <div class="card" style="max-width: 420px;">
    <form id="login-form" data-aa-form="login">
      <div class="row" style="display:block;">
        <label for="email">AAdvantage® number or email</label>
        <input id="email" name="email" type="email" autocomplete="username" data-aa-field="email" />
      </div>
      <div class="row" style="display:block;">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" data-aa-field="password" />
      </div>
      <button type="button" data-aa-action="sign-in" onclick="location.href='/dashboard'">Sign in</button>
    </form>
  </div>
</main>
<footer>Fixture site — not real AA. Served from localhost:7860.</footer>
</body>
</html>
