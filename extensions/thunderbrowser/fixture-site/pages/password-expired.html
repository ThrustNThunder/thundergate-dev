<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AA — Password expired (fixture)</title>
<link rel="stylesheet" href="/pages/_shared.css">
</head>
<body data-aa-state="aa.password_change">
<header class="aa-bar">
  <div class="brand">AA Fixture Portal</div>
  <nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/travel-planner">Travel Planner</a>
    <a href="/results">Results</a>
    <a href="/">Sign out</a>
  </nav>
</header>
<div class="state-strip">State: aa.password_change (interstitial)</div>
<main>
  <h1>Your password has expired</h1>
  <div class="card warning-banner">
    For security, AA requires a password change every 90 days. You can postpone this once.
  </div>
  <div class="card" style="max-width: 460px;">
    <p>Choose to update now or be reminded later.</p>
    <div class="row">
      <button type="button" data-aa-action="change-now" onclick="location.href='/'">Change password</button>
      <button type="button" class="btn muted" data-aa-action="remind-later" onclick="location.href='/dashboard'">Remind Me Later</button>
    </div>
  </div>
</main>
<footer>Fixture site — not real AA.</footer>
</body>
</html>
