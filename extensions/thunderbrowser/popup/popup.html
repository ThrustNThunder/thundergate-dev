<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ThunderBrowser</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      padding: 0;
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1d21;
      color: #d1d2d3;
    }
    .wrap { padding: 14px 16px; }
    h1 {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7b7d82;
      margin: 0 0 10px 0;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #27242c;
      font-size: 13px;
      font-weight: 500;
    }
    .pill.connected { color: #2bac76; }
    .pill.disconnected { color: #c97a7a; }
    .pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    .pill.disconnected .dot {
      background: transparent;
      border: 1px solid currentColor;
    }
    .meta {
      margin-top: 10px;
      font-size: 11px;
      color: #7b7d82;
    }
    .task-row {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2a2d31;
      font-size: 12px;
      color: #d1d2d3;
    }
    .task-row .task-key {
      display: block;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7b7d82;
      margin-bottom: 4px;
    }
    .err { color: #c97a7a; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ThunderBrowser</h1>
    <div id="status" class="pill disconnected">
      <span class="dot"></span><span id="status-label">Disconnected</span>
    </div>
    <div id="meta" class="meta"></div>
    <div id="task-row" class="task-row" style="display:none;">
      <span class="task-key">Current task</span>
      <span id="task-label">—</span>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
