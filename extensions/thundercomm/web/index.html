<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThunderComm</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sidebar: agent roster + channel list -->
  <aside id="sidebar">
    <div id="tc-header">
      <span id="tc-logo">⚡</span>
      <span id="tc-title">ThunderComm</span>
      <span id="conn-status" class="status-dot offline" title="Offline">●</span>
    </div>

    <nav id="channels">
      <div class="channel-section-label">CHANNELS</div>
      <button class="channel-btn active" data-channel="team" data-agent="">
        # team
      </button>

      <div class="channel-section-label">DIRECT</div>
      <button class="channel-btn" data-channel="direct" data-agent="jon">
        <span class="agent-dot" data-agent="jon">●</span> Jon
      </button>
      <button class="channel-btn" data-channel="direct" data-agent="sasha">
        <span class="agent-dot" data-agent="sasha">●</span> Sasha
      </button>
      <button class="channel-btn" data-channel="direct" data-agent="mack">
        <span class="agent-dot" data-agent="mack">●</span> Mack
      </button>
      <button class="channel-btn" data-channel="direct" data-agent="rex">
        <span class="agent-dot" data-agent="rex">●</span> Rex
      </button>
    </nav>
  </aside>

  <!-- Main chat area -->
  <main id="chat-area">
    <header id="chat-header">
      <span id="chat-title"># team</span>
      <span id="thinking-indicator" class="hidden">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </span>
    </header>

    <div id="messages" role="log" aria-live="polite"></div>

    <footer id="input-area">
      <button id="input-mode-toggle" title="Input mode">🎙️</button>
      <div id="text-input-wrap">
        <textarea
          id="text-input"
          placeholder="Message # team..."
          rows="1"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
      </div>
      <button id="send-btn" title="Send (Enter)">➤</button>
    </footer>
  </main>

  <!-- Auth overlay (shown before connection) -->
  <div id="auth-overlay">
    <div id="auth-box">
      <div id="auth-logo">⚡ ThunderComm</div>
      <p>Enter your gateway token to connect.</p>
      <input id="token-input" type="password" placeholder="Gateway token" autocomplete="current-password" />
      <input id="host-input" type="text" placeholder="Gateway host (e.g. localhost:8765)" value="localhost:8765" />
      <button id="connect-btn">Connect</button>
      <p id="auth-error" class="hidden"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
