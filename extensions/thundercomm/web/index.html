<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>ThunderCommo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Mobile sidebar backdrop (tap to close) -->
  <div id="sidebar-backdrop" aria-hidden="true"></div>

  <!-- Sidebar: agent roster + channel list -->
  <aside id="sidebar" aria-label="Channels">
    <div id="tc-header">
      <span id="tc-logo" aria-hidden="true">⚡</span>
      <span id="tc-title">ThunderCommo</span>
      <span id="conn-status" class="status-dot offline" title="Offline" aria-label="Offline" role="status">●</span>
    </div>

    <nav id="channels" role="tablist" aria-label="Channels">
      <div class="channel-section-label">CHANNELS</div>
      <button class="channel-btn active" data-channel="tnt" data-agent="" role="tab" aria-selected="true">
        # TNT
      </button>
      <div class="channel-section-label">DIRECT</div>
      <button class="channel-btn" data-channel="direct" data-agent="jon" role="tab" aria-selected="false">
        <span class="agent-dot" data-agent="jon" aria-hidden="true">●</span> Jon
      </button>
      <button class="channel-btn" data-channel="direct" data-agent="mack" role="tab" aria-selected="false">
        <span class="agent-dot" data-agent="mack" aria-hidden="true">●</span> Mack
      </button>
      <button class="channel-btn" data-channel="direct" data-agent="rex" role="tab" aria-selected="false">
        <span class="agent-dot" data-agent="rex" aria-hidden="true">●</span> Rex
      </button>

    </nav>

    <div id="sidebar-footer">
      <button class="sidebar-add-btn channel" id="add-channel-btn" type="button" title="Add channel">+ Channel</button>
      <button class="sidebar-add-btn agent" id="add-agent-btn" type="button" title="Add agent">+ Agent</button>
      <button class="sidebar-add-btn human" id="add-human-btn" type="button" title="Invite a human by phone number">+ Human</button>
    </div>
  </aside>

  <!-- Add Channel modal -->
  <div id="add-channel-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="add-channel-title">
    <div id="add-channel-box">
      <h3 id="add-channel-title"># Add Channel</h3>
      <p>Enter a channel name to add it to the sidebar.</p>
      <input id="add-channel-name" type="text" placeholder="e.g. jmab" autocomplete="off" />
      <div class="add-human-actions">
        <button id="add-channel-cancel" type="button">Cancel</button>
        <button id="add-channel-confirm" type="button" class="primary">Add</button>
      </div>
    </div>
  </div>

  <!-- Add Human modal -->
  <div id="add-human-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="add-human-title">
    <div id="add-human-box">
      <h3 id="add-human-title">👤 Invite a Human</h3>
      <p>Enter their phone number. They'll be invited to join ThunderCommo. (Integration coming — KYABYOAA onboarding flow.)</p>
      <input id="add-human-phone" type="tel" placeholder="+1 (555) 867-5309" autocomplete="tel" inputmode="tel" />
      <div class="add-human-actions">
        <button id="add-human-cancel" type="button">Cancel</button>
        <button id="add-human-confirm" type="button" class="primary">Add</button>
      </div>
    </div>
  </div>

  <!-- Main chat area -->
  <main id="chat-area">
    <header id="chat-header">
      <button id="sidebar-toggle" type="button" aria-label="Toggle channels" title="Channels">☰</button>
      <span id="chat-title">#TNT</span>
      <span id="llm-indicator" title="Active model" style="display:none;"></span>
      <span id="thinking-indicator" class="hidden" aria-hidden="true">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </span>
      <button id="header-collapse-btn" type="button" title="Collapse header" aria-label="Collapse header">▲</button>
    </header>

    <div id="messages" role="log" aria-live="polite" aria-relevant="additions"></div>

    <footer id="input-area">
      <button id="input-mode-toggle" type="button" title="Input mode" aria-label="Input mode">🎙️</button>
      <div id="text-input-wrap">
        <label for="text-input" class="sr-only">Message</label>
        <textarea
          id="text-input"
          placeholder="Message #TNT…"
          rows="1"
          autocomplete="off"
          autocapitalize="sentences"
          spellcheck="true"
          enterkeyhint="send"
          aria-label="Message"
        ></textarea>
      </div>
      <button id="send-btn" type="button" title="Send (Enter)" aria-label="Send">➤</button>
    </footer>
  </main>

  <!-- Auth overlay (shown before connection) -->
  <div id="auth-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-logo">
    <div id="auth-box">
      <div id="auth-logo">⚡ ThunderCommo</div>
      <p>Enter your gateway token to connect.</p>
      <label for="token-input" class="sr-only">Gateway token</label>
      <input id="token-input" type="password" placeholder="Gateway token" autocomplete="current-password" />
      <input id="host-input" type="hidden" value="commo.thunderai.us/ws" />
      <button id="connect-btn" type="button">Connect</button>
      <p id="auth-error" class="hidden" role="alert"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
