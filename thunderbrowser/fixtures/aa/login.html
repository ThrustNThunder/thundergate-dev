<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Sign in — AA fixture</title>
<style>body{font:14px sans-serif;max-width:480px;margin:48px auto;padding:0 16px}label{display:block;margin:12px 0 4px}input{width:100%;padding:8px}button{margin-top:12px;padding:8px 16px}</style>
</head>
<body>
  <h1>Sign in to your AAdvantage account</h1>
  <form data-aa-login>
    <label>AAdvantage number or username</label>
    <input name="user" autocomplete="username">
    <label>Password</label>
    <input name="password" type="password" autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
  <p><a href="/aa/dashboard">[dev shortcut → dashboard]</a></p>
</body>
</html>
